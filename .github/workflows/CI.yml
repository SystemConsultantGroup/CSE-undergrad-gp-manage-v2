name: CI

on:
  pull_request:
    branches: ['main']
  push:
    branches: ['main']

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: ESLint
        run: pnpm run lint
      - name: Prettier check
        run: pnpm run format:check

  test:
    name: Unit Test
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run tests with coverage
        run: pnpm run test:coverage -- --coverageReporters=json-summary --coverageReporters=text
      - name: Coverage comment (Unit)
        if: github.event_name == 'pull_request'
        uses: MishaKav/jest-coverage-comment@v1
        with:
          title: Unit Test Coverage
          coverage-summary-path: coverage/coverage-summary.json
          unique-id-for-comment: unit-test
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage-report
          path: coverage/
          retention-days: 14

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run integration tests with coverage
        run: pnpm run test:integration:coverage -- --coverageReporters=json-summary --coverageReporters=text
      - name: Coverage comment (Integration)
        if: github.event_name == 'pull_request'
        uses: MishaKav/jest-coverage-comment@v1
        with:
          title: Integration Test Coverage
          coverage-summary-path: coverage/coverage-summary.json
          unique-id-for-comment: integration-test
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-coverage-report
          path: coverage/
          retention-days: 14

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test, integration-test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build CSS
        run: pnpm run build:css
      - name: Docker build (dry run)
        run: docker build --no-cache -t cse-undergrad-gp-manage:ci-test .
